<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Feedback Form</title>
</head>

<body>

<h2>Customer Feedback Form</h2>

<form id="feedbackForm">

<!-- First Name -->
<input type="text" id="fname" placeholder="First Name">
<span id="fname-msg" style="color:red"></span>
<br><br>

<!-- Last Name -->
<input type="text" id="lname" placeholder="Last Name">
<span id="lname-msg" style="color:red"></span>
<br><br>

<!-- Email -->
<input type="email" id="email" placeholder="Email">
<span id="email-msg" style="color:red"></span>
<br><br>

<!-- Age -->
<input type="number" id="age" placeholder="Age">
<span id="age-msg" style="color:red"></span>
<br><br>

<!-- Gender -->
Gender:
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
<input type="radio" name="gender" value="Other"> Other
<span id="gender-msg" style="color:red"></span>
<br><br>

<!-- Phone with Country Code -->
<input type="text" id="phone" placeholder="Phone (+91XXXXXXXXXX)">
<span id="phone-msg" style="color:red"></span>
<br><br>

<!-- Profession -->
<input type="text" id="profession" placeholder="Profession">
<span id="profession-msg" style="color:red"></span>
<br><br>

<!-- Book Rating -->
<label>Book Rating:</label>
<select id="rating">
<option value="">Select Rating</option>
<option value="1">1 - Poor</option>
<option value="2">2</option>
<option value="3">3 - Average</option>
<option value="4">4</option>
<option value="5">5 - Excellent</option>
</select>
<span id="rating-msg" style="color:red"></span>
<br><br>

<!-- Feedback -->
<textarea id="feedback" placeholder="Write your feedback (max 1000 characters)" maxlength="1000"></textarea>
<span id="feedback-msg" style="color:red"></span>
<br><br>

<input type="submit" value="Submit">

</form>

<script>
document.getElementById("feedbackForm").addEventListener("submit", function(event){

    let isValid = true;

    let fname = document.getElementById("fname").value.trim();
    let lname = document.getElementById("lname").value.trim();
    let email = document.getElementById("email").value.trim();
    let age = document.getElementById("age").value;
    let phone = document.getElementById("phone").value.trim();
    let profession = document.getElementById("profession").value.trim();
    let rating = document.getElementById("rating").value;
    let feedback = document.getElementById("feedback").value.trim();

    let gender = document.querySelector('input[name="gender"]:checked');

    // First Name validation
    if(fname === ""){
        document.getElementById("fname-msg").textContent = "Enter first name";
        isValid = false;
    } else {
        document.getElementById("fname-msg").textContent = "";
    }

    // Last Name validation
    if(lname === ""){
        document.getElementById("lname-msg").textContent = "Enter last name";
        isValid = false;
    } else {
        document.getElementById("lname-msg").textContent = "";
    }

    // Email validation
    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if(!emailPattern.test(email)){
        document.getElementById("email-msg").textContent = "Enter valid email";
        isValid = false;
    } else {
        document.getElementById("email-msg").textContent = "";
    }

    // Age validation
    if(age === "" || age < 10 || age > 100){
        document.getElementById("age-msg").textContent = "Enter valid age (10-100)";
        isValid = false;
    } else {
        document.getElementById("age-msg").textContent = "";
    }

    // Gender validation
    if(!gender){
        document.getElementById("gender-msg").textContent = "Select gender";
        isValid = false;
    } else {
        document.getElementById("gender-msg").textContent = "";
    }

    // Phone validation (with country code)
    let phonePattern = /^\+\d{1,3}\d{10}$/;
    if(!phonePattern.test(phone)){
        document.getElementById("phone-msg").textContent = "Enter valid phone with country code";
        isValid = false;
    } else {
        document.getElementById("phone-msg").textContent = "";
    }

    // Profession validation
    if(profession === ""){
        document.getElementById("profession-msg").textContent = "Enter profession";
        isValid = false;
    } else {
        document.getElementById("profession-msg").textContent = "";
    }

    // Rating validation
    if(rating === ""){
        document.getElementById("rating-msg").textContent = "Select rating";
        isValid = false;
    } else {
        document.getElementById("rating-msg").textContent = "";
    }

    // Feedback validation
    if(feedback === ""){
        document.getElementById("feedback-msg").textContent = "Enter feedback";
        isValid = false;
    } else if(feedback.length > 1000){
        document.getElementById("feedback-msg").textContent = "Max 1000 characters allowed";
        isValid = false;
    } else {
        document.getElementById("feedback-msg").textContent = "";
    }

    if(!isValid){
        event.preventDefault();
    }

});
</script>

</body>
</html>
